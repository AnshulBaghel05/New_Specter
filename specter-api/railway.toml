# Railway service config for specter-api (FastAPI).
# https://docs.railway.app/reference/config-as-code
#
# The scraper (Node/BullMQ workers + Bull Board) and any cron run as SEPARATE
# Railway services with their own start commands — this file configures the API
# web service only.

[build]
builder = "nixpacks"

[deploy]
# Railway injects $PORT; bind 0.0.0.0 so the platform proxy can reach us.
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
# /livez is a pure liveness probe (200 once the process serves) — gating the
# deploy on it means a slow/misconfigured Postgres or Redis can't brick a rollout.
# Dependency health is exposed separately at /health and /readyz (503 if either
# Postgres or Redis is down) for monitoring, not for deploy gating.
healthcheckPath = "/livez"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
