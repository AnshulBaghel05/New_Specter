name: Deploy

# Production deploy — runs ONLY on push to main (i.e. after a PR merges).
# It never runs on pull_request, so unreviewed code can't reach production.
# Pair this with a branch-protection rule that requires the CI workflow to pass
# before merge, so only CI-green code is ever pushed to main.
on:
  push:
    branches: [main]

# Never run two production deploys at once.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── specter-web → Vercel ────────────────────────────────────────────────────
  # Uses the official Vercel CLI (pull → build → deploy --prebuilt), the
  # documented CI path. Requires these repo secrets:
  #   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
  deploy-web:
    name: specter-web → Vercel (prod)
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: specter-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ── specter-api → Railway ───────────────────────────────────────────────────
  # Uses the official Railway CLI (`railway up`). Requires repo secrets:
  #   RAILWAY_TOKEN          — project token (Railway → project → Settings → Tokens)
  #   RAILWAY_API_SERVICE    — the API service name on Railway
  # To deploy the scraper worker services too, duplicate this job per service
  # (worker:probe / worker:http / worker:playwright / scheduler) with its own
  # RAILWAY_*_SERVICE secret, or rely on Railway's git integration for those.
  deploy-api:
    name: specter-api → Railway (prod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: specter-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ secrets.RAILWAY_API_SERVICE }}" --ci
